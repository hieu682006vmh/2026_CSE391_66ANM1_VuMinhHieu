<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Điểm Sinh Viên</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

input{
    padding:6px;
    margin-right:10px;
}

button{
    padding:6px 12px;
}

table{
    border-collapse: collapse;
    margin-top:20px;
    width:600px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

.low{
    background:yellow;
}

#stats{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input type="text" id="name" placeholder="Họ tên">
<input type="number" id="score" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>

<div id="stats">
Tổng SV: 0 | Điểm TB: 0
</div>

<script>

let students = []

const nameInput = document.getElementById("name")
const scoreInput = document.getElementById("score")
const tableBody = document.getElementById("tableBody")
const stats = document.getElementById("stats")
const addBtn = document.getElementById("addBtn")


function getRank(score){

    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"

}


function renderTable(){

    tableBody.innerHTML = ""

    students.forEach((sv,index)=>{

        const tr = document.createElement("tr")

        if(sv.score < 5){
            tr.classList.add("low")
        }

        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${sv.name}</td>
        <td>${sv.score}</td>
        <td>${getRank(sv.score)}</td>
        <td><button class="delete" data-index="${index}">Xóa</button></td>
        `

        tableBody.appendChild(tr)

    })

    updateStats()

}


function updateStats(){

    const total = students.length

    let avg = 0

    if(total > 0){
        let sum = students.reduce((s,sv)=> s + sv.score ,0)
        avg = (sum / total).toFixed(2)
    }

    stats.textContent = `Tổng SV: ${total} | Điểm TB: ${avg}`

}


function addStudent(){

    const name = nameInput.value.trim()
    const score = Number(scoreInput.value)

    if(name === ""){
        alert("Họ tên không được trống")
        return
    }

    if(isNaN(score) || score < 0 || score > 10){
        alert("Điểm phải từ 0 đến 10")
        return
    }

    students.push({
        name:name,
        score:score
    })

    renderTable()

    nameInput.value = ""
    scoreInput.value = ""

    nameInput.focus()

}


addBtn.addEventListener("click", addStudent)


scoreInput.addEventListener("keyup",function(e){

    if(e.key === "Enter"){
        addStudent()
    }

})


tableBody.addEventListener("click",function(e){

    if(e.target.classList.contains("delete")){

        const index = e.target.getAttribute("data-index")

        students.splice(index,1)

        renderTable()

    }

})

</script>

</body>
</html>
