<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đặt Hàng</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.form-group{
margin-bottom:15px;
}

.error{
color:red;
font-size:13px;
display:block;
}

textarea{
width:300px;
height:80px;
}

#charCount{
font-size:13px;
}

#confirmBox{
display:none;
border:1px solid #ccc;
padding:15px;
margin-top:20px;
background:#f5f5f5;
}

#success{
display:none;
font-size:20px;
color:green;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Đặt hàng</h2>

<form id="orderForm">

<div class="form-group">
<label>Sản phẩm</label><br>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="Áo">Áo</option>
<option value="Quần">Quần</option>
<option value="Giày">Giày</option>
</select>
<span class="error" id="productError"></span>
</div>

<div class="form-group">
<label>Số lượng</label><br>
<input type="number" id="quantity">
<span class="error" id="quantityError"></span>
</div>

<div class="form-group">
<label>Ngày giao hàng</label><br>
<input type="date" id="delivery">
<span class="error" id="deliveryError"></span>
</div>

<div class="form-group">
<label>Địa chỉ giao</label><br>
<input type="text" id="address">
<span class="error" id="addressError"></span>
</div>

<div class="form-group">
<label>Ghi chú</label><br>
<textarea id="note"></textarea><br>
<span id="charCount">0/200</span>
<span class="error" id="noteError"></span>
</div>

<div class="form-group">
<label>Thanh toán</label><br>
<input type="radio" name="payment" value="COD"> COD
<input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản
<input type="radio" name="payment" value="Ví điện tử"> Ví điện tử
<span class="error" id="paymentError"></span>
</div>

<div>
<strong>Tổng tiền:</strong> <span id="total">0</span> VNĐ
</div>

<br>
<button type="submit">Đặt hàng</button>

</form>

<div id="confirmBox">
<h3>Xác nhận đơn hàng</h3>
<div id="summary"></div>
<br>
<button id="confirmBtn">Xác nhận</button>
<button id="cancelBtn">Hủy</button>
</div>

<div id="success"></div>

<script>

const prices={
"Áo":150000,
"Quần":200000,
"Giày":500000
}

const form=document.getElementById("orderForm")
const product=document.getElementById("product")
const quantity=document.getElementById("quantity")
const delivery=document.getElementById("delivery")
const address=document.getElementById("address")
const note=document.getElementById("note")

const total=document.getElementById("total")
const charCount=document.getElementById("charCount")

const confirmBox=document.getElementById("confirmBox")
const summary=document.getElementById("summary")

const success=document.getElementById("success")

function showError(id,msg){
document.getElementById(id+"Error").textContent=msg
}

function clearError(id){
document.getElementById(id+"Error").textContent=""
}

function validateProduct(){
if(product.value===""){
showError("product","Chọn sản phẩm")
return false
}
clearError("product")
return true
}

function validateQuantity(){

let q=Number(quantity.value)

if(!Number.isInteger(q) || q<1 || q>99){
showError("quantity","1-99")
return false
}

clearError("quantity")
return true
}

function validateDelivery(){

let date=new Date(delivery.value)
let today=new Date()

let max=new Date()
max.setDate(today.getDate()+30)

if(!delivery.value){
showError("delivery","Chọn ngày")
return false
}

if(date<today){
showError("delivery","Không chọn quá khứ")
return false
}

if(date>max){
showError("delivery","Không quá 30 ngày")
return false
}

clearError("delivery")
return true
}

function validateAddress(){

let val=address.value.trim()

if(val.length<10){
showError("address","Ít nhất 10 ký tự")
return false
}

clearError("address")
return true
}

function validateNote(){

if(note.value.length>200){
showError("note","Tối đa 200 ký tự")
return false
}

clearError("note")
return true
}

function validatePayment(){

let radios=document.getElementsByName("payment")

for(let r of radios){
if(r.checked){
clearError("payment")
return true
}
}

showError("payment","Chọn phương thức")
return false
}

function updateTotal(){

let p=product.value
let q=Number(quantity.value)

if(prices[p] && q){

let money=prices[p]*q

total.textContent=money.toLocaleString("vi-VN")

}else{

total.textContent=0

}

}

note.addEventListener("input",function(){

let len=note.value.length

charCount.textContent=len+"/200"

if(len>200){
charCount.style.color="red"
}else{
charCount.style.color="black"
}

validateNote()

})

product.addEventListener("change",updateTotal)
quantity.addEventListener("input",updateTotal)

product.addEventListener("blur",validateProduct)
quantity.addEventListener("blur",validateQuantity)
delivery.addEventListener("blur",validateDelivery)
address.addEventListener("blur",validateAddress)

form.addEventListener("submit",function(e){

e.preventDefault()

let valid=
validateProduct() &
validateQuantity() &
validateDelivery() &
validateAddress() &
validateNote() &
validatePayment()

if(valid){

summary.innerHTML=
"Sản phẩm: "+product.value+"<br>"+
"Số lượng: "+quantity.value+"<br>"+
"Tổng tiền: "+total.textContent+" VNĐ<br>"+
"Ngày giao: "+delivery.value

confirmBox.style.display="block"

}

})

document.getElementById("confirmBtn").onclick=function(){

confirmBox.style.display="none"

form.style.display="none"

success.innerHTML="Đặt hàng thành công 🎉"

success.style.display="block"

}

document.getElementById("cancelBtn").onclick=function(){

confirmBox.style.display="none"

}

</script>

</body>
</html>
