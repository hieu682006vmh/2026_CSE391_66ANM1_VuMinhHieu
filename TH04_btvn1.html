<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.form-group{
margin-bottom:15px;
}

input{
padding:6px;
width:250px;
}

.error{
color:red;
font-size:13px;
display:block;
}

.input-error{
border:1px solid red;
}

.input-success{
border:1px solid green;
}

#success{
display:none;
font-size:20px;
color:green;
margin-top:20px;
}

/* đếm ký tự */
#nameCount{
font-size:12px;
color:gray;
}

/* password strength */

.strength{
height:8px;
width:250px;
background:#ddd;
margin-top:5px;
}

.strength-bar{
height:8px;
width:0%;
}

.weak{background:red}
.medium{background:orange}
.strong{background:green}

</style>

</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<div class="form-group">
<label>Họ và tên</label><br>
<input type="text" id="fullname" maxlength="50">
<div id="nameCount">0/50</div>
<span class="error" id="fullnameError"></span>
</div>

<div class="form-group">
<label>Email</label><br>
<input type="text" id="email">
<span class="error" id="emailError"></span>
</div>

<div class="form-group">
<label>Số điện thoại</label><br>
<input type="text" id="phone">
<span class="error" id="phoneError"></span>
</div>

<div class="form-group">
<label>Mật khẩu</label><br>

<input type="password" id="password">
<button type="button" id="togglePass">👁</button>

<div class="strength">
<div id="strengthBar" class="strength-bar"></div>
</div>

<span class="error" id="passwordError"></span>

</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label><br>
<input type="password" id="confirmPassword">
<span class="error" id="confirmError"></span>
</div>

<div class="form-group">
<label>Giới tính</label><br>
<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ
<br>
<span class="error" id="genderError"></span>
</div>

<div class="form-group">
<input type="checkbox" id="terms"> Tôi đồng ý điều khoản
<span class="error" id="termsError"></span>
</div>

<button type="submit">Đăng ký</button>

</form>

<div id="success"></div>

<script>

const form = document.getElementById("registerForm")

const fullname = document.getElementById("fullname")
const email = document.getElementById("email")
const phone = document.getElementById("phone")
const password = document.getElementById("password")
const confirmPassword = document.getElementById("confirmPassword")
const terms = document.getElementById("terms")

const success = document.getElementById("success")

const strengthBar = document.getElementById("strengthBar")
const togglePass = document.getElementById("togglePass")
const nameCount = document.getElementById("nameCount")

/* đếm ký tự tên */

fullname.addEventListener("input",function(){

let len = fullname.value.length
nameCount.textContent = len + "/50"

})

/* toggle password */

togglePass.onclick=function(){

if(password.type==="password"){
password.type="text"
}else{
password.type="password"
}

}

/* password strength */

password.addEventListener("input",function(){

let val=password.value

let score=0

if(val.length>=8) score++
if(/[A-Z]/.test(val)) score++
if(/[0-9]/.test(val)) score++

if(score==1){
strengthBar.style.width="33%"
strengthBar.className="strength-bar weak"
}

else if(score==2){
strengthBar.style.width="66%"
strengthBar.className="strength-bar medium"
}

else if(score==3){
strengthBar.style.width="100%"
strengthBar.className="strength-bar strong"
}

})

function showError(inputId,message){

let input = document.getElementById(inputId)
let error = document.getElementById(inputId+"Error")

error.textContent = message

input.classList.add("input-error")
input.classList.remove("input-success")

}

function clearError(inputId){

let input = document.getElementById(inputId)
let error = document.getElementById(inputId+"Error")

error.textContent=""

input.classList.remove("input-error")
input.classList.add("input-success")

}

function validateFullname(){

let value = fullname.value.trim()

let regex = /^[a-zA-ZÀ-ỹ\s]+$/

if(value===""){
showError("fullname","Không được để trống")
return false
}

if(value.length < 3){
showError("fullname","Ít nhất 3 ký tự")
return false
}

if(!regex.test(value)){
showError("fullname","Chỉ chứa chữ")
return false
}

clearError("fullname")
return true

}

function validateEmail(){

let value = email.value.trim()

let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

if(value===""){
showError("email","Không được để trống")
return false
}

if(!regex.test(value)){
showError("email","Email không hợp lệ")
return false
}

clearError("email")
return true

}

function validatePhone(){

let value = phone.value.trim()

let regex = /^0[0-9]{9}$/

if(value===""){
showError("phone","Không được để trống")
return false
}

if(!regex.test(value)){
showError("phone","SĐT phải 10 số bắt đầu bằng 0")
return false
}

clearError("phone")
return true

}

function validatePassword(){

let value = password.value

let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

if(value===""){
showError("password","Không được để trống")
return false
}

if(!regex.test(value)){
showError("password","≥8 ký tự gồm hoa, thường, số")
return false
}

clearError("password")
return true

}

function validateConfirm(){

if(confirmPassword.value !== password.value){

document.getElementById("confirmError").textContent="Mật khẩu không khớp"
confirmPassword.classList.add("input-error")

return false

}

document.getElementById("confirmError").textContent=""
confirmPassword.classList.remove("input-error")
confirmPassword.classList.add("input-success")

return true

}

function validateGender(){

let genders = document.getElementsByName("gender")

for(let g of genders){
if(g.checked){
document.getElementById("genderError").textContent=""
return true
}
}

document.getElementById("genderError").textContent="Chọn giới tính"
return false

}

function validateTerms(){

if(!terms.checked){

document.getElementById("termsError").textContent="Phải đồng ý điều khoản"
return false

}

document.getElementById("termsError").textContent=""
return true

}

fullname.addEventListener("blur",validateFullname)
email.addEventListener("blur",validateEmail)
phone.addEventListener("blur",validatePhone)
password.addEventListener("blur",validatePassword)
confirmPassword.addEventListener("blur",validateConfirm)

fullname.addEventListener("input",()=>clearError("fullname"))
email.addEventListener("input",()=>clearError("email"))
phone.addEventListener("input",()=>clearError("phone"))
password.addEventListener("input",()=>clearError("password"))
confirmPassword.addEventListener("input",()=>document.getElementById("confirmError").textContent="")

form.addEventListener("submit",function(e){

e.preventDefault()

let valid =
validateFullname() &
validateEmail() &
validatePhone() &
validatePassword() &
validateConfirm() &
validateGender() &
validateTerms()

if(valid){

form.style.display="none"

success.innerHTML="Đăng ký thành công! 🎉<br>Xin chào <b>"+fullname.value+"</b>"

success.style.display="block"

}

})

</script>

</body>
</html>
